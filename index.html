<!DOCTYPE html>
<html lang="my" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ဆရာ/ဆရာမများ ထမင်းစား မှတ်တမ်း</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: { colors: { primary: '#3b82f6', } }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js Library ကို Graph ဆွဲရန်အတွက် ထည့်သွင်းထားပါသည် -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Padauk:wght@400;700&display=swap');
        body { font-family: 'Padauk', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .loader {
            border: 3px solid #f3f3f3; border-radius: 50%; border-top: 3px solid #ffffff;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: none;
        }
        .small-loader {
            border: 2px solid #f3f3f3; border-radius: 50%; border-top: 2px solid #3b82f6;
            width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 dark:bg-gray-900 dark:text-gray-200 min-h-screen flex flex-col items-center py-8 px-4">

    <!-- Form Card -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg overflow-hidden mb-6 transition-colors">
        <div class="bg-blue-600 dark:bg-blue-800 text-white p-6 relative">
            <h1 class="text-2xl font-bold text-center">ထမင်းစား မှတ်တမ်း</h1>
            <p class="text-center text-blue-200 text-sm mt-1">စာရင်းသွင်း / ပြင်ဆင်ရန်</p>
            
            <!-- Light/Dark Mode Toggle Icon -->
            <button id="themeToggle" class="absolute top-4 right-4 bg-white/20 hover:bg-white/30 rounded-full p-2 flex items-center justify-center w-10 h-10 transition-colors">
                <!-- Moon Icon -->
                <svg id="moonIcon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" />
                </svg>
                <!-- Sun Icon -->
                <svg id="sunIcon" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5 text-white hidden">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" />
                </svg>
            </button>
        </div>

        <div class="p-6">
            <div id="alertBox" class="hidden mb-4 p-4 rounded-lg text-sm font-medium" role="alert">
                <span id="alertMessage"></span>
            </div>

            <form id="mealForm" class="space-y-4">
                <input type="hidden" id="recordId" value="">

                <div>
                    <label class="block text-sm font-medium mb-1">ရက်စွဲ</label>
                    <input type="date" id="date" required onchange="loadRecords()" class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">ဆရာ/ဆရာမ အမည်</label>
                    <input type="text" id="teacherName" placeholder="အမည် ရိုက်ထည့်ပါ" required class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">စားမည့်အချိန်</label>
                    <select id="mealType" required class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                        <option value="" disabled selected>ရွေးချယ်ပါ</option>
                        <option value="နေ့လယ်စာ">နေ့လယ်စာ</option>
                        <option value="ညစာ">ညစာ</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">မှတ်ချက် (Optional)</label>
                    <input type="text" id="remark" placeholder="မှတ်ချက်" class="w-full rounded-lg border border-gray-300 bg-gray-50 p-2.5 dark:border-gray-600 dark:bg-gray-700 dark:text-white">
                </div>

                <div class="text-right">
                    <button type="button" onclick="toggleSettings()" class="text-xs text-blue-500 underline"><i class="fas fa-cog"></i> Configuration</button>
                </div>

                <div id="settingsSection" class="hidden space-y-3 p-4 bg-gray-100 dark:bg-gray-700 rounded-lg border border-gray-200 dark:border-gray-600">
                    <input type="text" id="sheetUrl" placeholder="Google Apps Script URL" class="w-full text-sm rounded border border-gray-300 p-2 dark:bg-gray-800 dark:text-white">
                    <button type="button" onclick="saveSettings()" class="w-full bg-gray-800 text-white text-sm p-2 rounded">Save</button>
                </div>

                <div class="flex gap-2">
                    <button type="button" id="cancelEditBtn" onclick="resetForm()" class="hidden w-1/3 bg-gray-500 hover:bg-gray-600 text-white font-bold rounded-lg px-4 py-3 text-center">Batal</button>
                    <button type="submit" id="submitBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg px-5 py-3 flex justify-center items-center gap-2">
                        <span id="submitBtnText">Telegram သို့ ပို့မည်</span>
                        <div id="btnLoader" class="loader"></div>
                        <i id="btnIcon" class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Records List Card (နေ့စဉ်မှတ်တမ်း) -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transition-colors mb-6">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap justify-between items-center bg-gray-50 dark:bg-gray-700 gap-2">
            <h2 class="font-bold text-lg flex flex-wrap items-center">
                <i class="fas fa-list mr-2 text-blue-500"></i> မှတ်တမ်းများ 
                <span id="displayDateText" class="ml-2 text-sm font-normal text-blue-500 dark:text-blue-400 bg-blue-100 dark:bg-blue-900/50 px-2 py-0.5 rounded-full"></span>
                <!-- FEATURE 1: Daily Total Highlight -->
                <span id="dailyTotalBadge" class="ml-2 text-sm font-bold text-white bg-green-500 px-3 py-0.5 rounded-full shadow-sm hidden">စုစုပေါင်း - 0 ယောက်</span>
            </h2>
            <button onclick="loadRecords()" class="text-blue-500 hover:text-blue-700 text-sm flex items-center gap-1 bg-white dark:bg-gray-800 px-2 py-1 rounded shadow-sm border border-gray-200 dark:border-gray-600">
                <i class="fas fa-sync-alt" id="refreshIcon"></i> Refresh
            </button>
        </div>
        <div class="p-4">
            <div id="recordsContainer" class="space-y-3 max-h-96 overflow-y-auto pr-2">
                <p class="text-center text-sm text-gray-500 py-4">ဒေတာများကို ဆွဲယူနေပါသည်...</p>
            </div>
        </div>
    </div>

    <!-- Chart & Export Card (အများဆုံးစားသူ Graph) -->
    <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl w-full max-w-lg overflow-hidden transition-colors">
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex flex-wrap justify-between items-center bg-gray-50 dark:bg-gray-700 gap-2">
            <h2 class="font-bold text-lg flex items-center">
                <i class="fas fa-chart-bar mr-2 text-blue-500"></i> အများဆုံးစားသူများ 
            </h2>
            <div class="flex items-center gap-2">
                <!-- FEATURE 2: Month Filter -->
                <input type="month" id="statsMonth" class="text-sm rounded border border-gray-300 p-1.5 dark:bg-gray-800 dark:text-white dark:border-gray-600" onchange="loadStats()">
                
                <!-- FEATURE 3: Export Button -->
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white text-xs px-3 py-2 rounded flex items-center gap-1 transition-colors shadow-sm" title="လစဉ်မှတ်တမ်း Excel ဒေါင်းလုဒ်ဆွဲရန်">
                    <i class="fas fa-file-excel" id="exportIcon"></i> 
                    <span class="hidden sm:inline">Export</span>
                </button>
            </div>
        </div>
        <div class="p-4">
            <canvas id="mealChart" class="w-full" height="250"></canvas>
            <p id="chartEmptyState" class="text-center text-sm text-gray-500 py-4 hidden">မှတ်တမ်းမရှိသေးပါ</p>
        </div>
    </div>

    <script>
        // --- Dark Mode Logic ---
        const htmlElement = document.documentElement;
        const moonIcon = document.getElementById('moonIcon');
        const sunIcon = document.getElementById('sunIcon');

        function applyTheme(isDark) {
            if (isDark) {
                htmlElement.classList.add('dark');
                moonIcon.classList.add('hidden');
                sunIcon.classList.remove('hidden');
            } else {
                htmlElement.classList.remove('dark');
                sunIcon.classList.add('hidden');
                moonIcon.classList.remove('hidden');
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            applyTheme(true);
        } else {
            applyTheme(false);
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const isDarkNow = htmlElement.classList.contains('dark');
            applyTheme(!isDarkNow);
            localStorage.theme = !isDarkNow ? 'dark' : 'light';
            
            if (mealChart) {
                const textColor = !isDarkNow ? '#d1d5db' : '#374151';
                const gridColor = !isDarkNow ? '#374151' : '#e5e7eb';
                mealChart.options.scales.x.ticks.color = textColor;
                mealChart.options.scales.y.ticks.color = textColor;
                mealChart.options.scales.y.grid.color = gridColor;
                mealChart.options.plugins.legend.labels.color = textColor;
                mealChart.update();
            }
        });

        // --- Global Variables ---
        let mealChart = null;

        // --- Init ---
        document.getElementById('date').valueAsDate = new Date();
        // Set Default Month for Stats to Current Month
        document.getElementById('statsMonth').value = new Date().toISOString().slice(0, 7);

        window.onload = () => {
            if(localStorage.getItem('gs_url')) {
                document.getElementById('sheetUrl').value = localStorage.getItem('gs_url');
                loadRecords(); 
                loadStats();
            }
        }

        // --- Settings ---
        function toggleSettings() { document.getElementById('settingsSection').classList.toggle('hidden'); }
        function saveSettings() {
            localStorage.setItem('gs_url', document.getElementById('sheetUrl').value);
            showAlert('Settings သိမ်းဆည်းပြီးပါပြီ။', 'success');
            toggleSettings();
            loadRecords();
            loadStats();
        }

        // --- UI Helpers ---
        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `mb-4 p-4 rounded-lg text-sm font-medium ${type === 'error' ? 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200' : 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-200'}`;
            document.getElementById('alertMessage').innerText = message;
            alertBox.classList.remove('hidden');
            setTimeout(() => alertBox.classList.add('hidden'), 5000); 
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = isLoading;
            document.getElementById('btnLoader').style.display = isLoading ? 'block' : 'none';
            document.getElementById('btnIcon').style.display = isLoading ? 'none' : 'block';
            document.getElementById('submitBtnText').innerText = isLoading ? 'လုပ်ဆောင်နေပါသည်...' : (document.getElementById('recordId').value ? 'ပြင်ဆင်မည်' : 'Telegram သို့ ပို့မည်');
        }

        function resetForm() {
            document.getElementById('mealForm').reset();
            document.getElementById('date').valueAsDate = new Date(); 
            document.getElementById('recordId').value = "";
            document.getElementById('submitBtnText').innerText = "Telegram သို့ ပို့မည်";
            document.getElementById('cancelEditBtn').classList.add('hidden');
            loadRecords(); 
        }

        // --- 1. Read Daily Records ---
        async function loadRecords() {
            const url = localStorage.getItem('gs_url');
            if(!url) return;
            
            const selectedDate = document.getElementById('date').value; 
            document.getElementById('displayDateText').innerText = selectedDate; 

            const container = document.getElementById('recordsContainer');
            const icon = document.getElementById('refreshIcon');
            const totalBadge = document.getElementById('dailyTotalBadge');
            
            icon.classList.add('fa-spin');
            
            try {
                const response = await fetch(`${url}?action=read&date=${selectedDate}`);
                const data = await response.json();
                
                container.innerHTML = ''; 
                if(data.length === 0) {
                    container.innerHTML = `<p class="text-center text-sm text-gray-500 py-4">${selectedDate} ရက်နေ့အတွက် မှတ်တမ်းမရှိသေးပါ။</p>`;
                    totalBadge.classList.add('hidden');
                } else {
                    // FEATURE 1: Show Total Count Highlight
                    totalBadge.innerText = `စုစုပေါင်း - ${data.length} ယောက်`;
                    totalBadge.classList.remove('hidden');

                    data.reverse().forEach(record => {
                        const div = document.createElement('div');
                        div.className = "bg-gray-100 dark:bg-gray-700 p-3 rounded-lg border border-gray-200 dark:border-gray-600 flex justify-between items-center";
                        div.innerHTML = `
                            <div>
                                <p class="text-sm font-bold text-blue-600 dark:text-blue-400">${record.Name}</p>
                                <p class="text-xs mt-1">🍽 ${record.MealType} | 💬 ${record.Remark || "-"}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editRecord('${record.ID}', '${record.Date}', '${record.Name}', '${record.MealType}', '${record.Remark}')" class="text-yellow-600 hover:text-yellow-700 bg-yellow-100 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-pen text-xs"></i></button>
                                <button onclick="deleteRecord('${record.ID}')" class="text-red-600 hover:text-red-700 bg-red-100 p-2 rounded-full w-8 h-8 flex items-center justify-center"><i class="fas fa-trash text-xs"></i></button>
                            </div>
                        `;
                        container.appendChild(div);
                    });
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<p class="text-center text-sm text-red-500 py-4">ဒေတာရယူရာတွင် အမှားရှိပါသည်။</p>';
                totalBadge.classList.add('hidden');
            } finally {
                icon.classList.remove('fa-spin');
            }
        }

        // --- 2. Load Stats (Graph ပြရန် - FEATURE 2: Month Filter ပါဝင်သည်) ---
        async function loadStats() {
            const url = localStorage.getItem('gs_url');
            if(!url) return;
            
            const selectedMonth = document.getElementById('statsMonth').value; // e.g., "2023-10"
            
            try {
                // Backend မှ action=stats တွင် month parameter ကို လက်ခံနိုင်ရန် ချိန်ညှိရပါမည်
                const response = await fetch(`${url}?action=stats&month=${selectedMonth}`);
                const data = await response.json();
                
                if (data.length === 0) {
                    document.getElementById('mealChart').classList.add('hidden');
                    document.getElementById('chartEmptyState').classList.remove('hidden');
                    return;
                }

                document.getElementById('mealChart').classList.remove('hidden');
                document.getElementById('chartEmptyState').classList.add('hidden');

                const labels = data.map(d => d.name);
                const counts = data.map(d => d.count);
                
                const ctx = document.getElementById('mealChart').getContext('2d');
                
                const isDark = document.documentElement.classList.contains('dark');
                const textColor = isDark ? '#d1d5db' : '#374151'; 
                const gridColor = isDark ? '#374151' : '#e5e7eb';

                if (mealChart) { mealChart.destroy(); }
                
                mealChart = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'စားသုံးခဲ့သည့် အကြိမ်အရေအတွက်',
                            data: counts,
                            backgroundColor: 'rgba(59, 130, 246, 0.7)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { color: textColor, stepSize: 1 },
                                grid: { color: gridColor }
                            },
                            x: {
                                ticks: { color: textColor },
                                grid: { display: false }
                            }
                        },
                        plugins: {
                            legend: { labels: { color: textColor, font: { family: 'Padauk' } } }
                        }
                    }
                });
            } catch (error) {
                console.error(error);
            }
        }

        // --- 3. Export to Excel CSV (FEATURE 3) ---
        async function exportToExcel() {
            const url = localStorage.getItem('gs_url');
            if(!url) return showAlert('Configuration တွင် URL အရင်ထည့်ပါ။', 'error');
            
            const selectedMonth = document.getElementById('statsMonth').value;
            if(!selectedMonth) return showAlert('လရွေးချယ်ပါ', 'error');

            const exportIcon = document.getElementById('exportIcon');
            exportIcon.className = "fas fa-spinner fa-spin"; // Loading အနေဖြင့်ပြရန်

            try {
                // Backend မှ action=read_month ကို အသုံးပြု၍ သက်ဆိုင်ရာလ၏ data အားလုံးဆွဲထုတ်ခြင်း
                const response = await fetch(`${url}?action=read_month&month=${selectedMonth}`);
                const data = await response.json();

                if(data.length === 0) {
                    showAlert('ရွေးချယ်ထားသော လအတွက် ဒေတာမရှိပါ။', 'error');
                    exportIcon.className = "fas fa-file-excel";
                    return;
                }

                // CSV Format ပြောင်းခြင်း (UTF-8 BOM ထည့်သွင်းပေးခြင်းဖြင့် Excel တွင် မြန်မာစာမှန်ကန်စေရန်)
                let csvContent = "data:text/csv;charset=utf-8,\uFEFF";
                csvContent += "ရက်စွဲ,အမည်,စားမည့်အချိန်,မှတ်ချက်\n";

                data.forEach(row => {
                    const date = row.Date || "";
                    const name = `"${(row.Name || "").replace(/"/g, '""')}"`;
                    const mealType = `"${(row.MealType || "").replace(/"/g, '""')}"`;
                    const remark = `"${(row.Remark || "").replace(/"/g, '""')}"`;
                    
                    csvContent += `${date},${name},${mealType},${remark}\n`;
                });

                // ဒေါင်းလုဒ်လုပ်ရန် Link တည်ဆောက်ခြင်း
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `Meal_Records_${selectedMonth}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showAlert('Excel ဖိုင် ဒေါင်းလုဒ်လုပ်ပြီးပါပြီ။', 'success');
            } catch (error) {
                console.error(error);
                showAlert('Export လုပ်ရာတွင် အမှားရှိပါသည်။', 'error');
            } finally {
                exportIcon.className = "fas fa-file-excel"; // မူလ icon ပြန်ထားရန်
            }
        }

        // --- Submit (Insert or Update) ---
        document.getElementById('mealForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = localStorage.getItem('gs_url');
            if (!url) return showAlert('Configuration တွင် URL အရင်ထည့်ပါ။', 'error');

            const id = document.getElementById('recordId').value;
            const date = document.getElementById('date').value;
            const name = document.getElementById('teacherName').value;
            const mealType = document.getElementById('mealType').value;
            const remark = document.getElementById('remark').value || "-";
            const action = id ? 'update' : 'insert';

            setLoading(true);

            try {
                const fetchUrl = `${url}?action=${action}&id=${id}&date=${encodeURIComponent(date)}&name=${encodeURIComponent(name)}&mealType=${encodeURIComponent(mealType)}&remark=${encodeURIComponent(remark)}`;
                const response = await fetch(fetchUrl);
                const result = await response.json();

                if(result.status === 'success') {
                    
                    if(!id) {
                        const telegramMessage = `📝 ${mealType} စာရင်းပေးပို့ခြင်း\n📅 ရက်စွဲ: ${date}\n👤 အမည်: ${name}\n🍽 အခြေအနေ: ✅ စားမည်\n💬 မှတ်ချက်: ${remark}`;
                        
                        const textArea = document.createElement("textarea");
                        textArea.value = telegramMessage;
                        document.body.appendChild(textArea);
                        textArea.select();
                        try {
                            document.execCommand('copy');
                            showAlert('စာသားကို Copy ကူးထားပြီးပါပြီ။ Telegram တွင် Paste (Ctrl + V) လုပ်၍ ပို့နိုင်ပါသည်။', 'success');
                        } catch (err) {}
                        document.body.removeChild(textArea);

                        setTimeout(() => { window.location.href = "tg://"; }, 1000);
                    } else {
                        showAlert('မှတ်တမ်း ပြင်ဆင်ပြီးပါပြီ။', 'success');
                    }

                    resetForm();
                    loadStats(); 
                } else { throw new Error("Failed"); }
            } catch (error) {
                showAlert('အမှားအယွင်းဖြစ်ပေါ်နေပါသည်။', 'error');
            } finally { setLoading(false); }
        });

        // --- Setup Edit ---
        function editRecord(id, date, name, mealType, remark) {
            try { 
                document.getElementById('date').value = date; 
                loadRecords(); 
            } catch(e){}
            
            document.getElementById('recordId').value = id;
            document.getElementById('teacherName').value = name;
            document.getElementById('mealType').value = mealType;
            document.getElementById('remark').value = remark === "-" ? "" : remark;
            
            document.getElementById('submitBtnText').innerText = "ပြင်ဆင်မည်";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- Delete ---
        async function deleteRecord(id) {
            if(!confirm("ဤမှတ်တမ်းကို ဖျက်ရန် သေချာပါသလား?")) return;
            
            const url = localStorage.getItem('gs_url');
            if (!url) return;

            try {
                document.getElementById('recordsContainer').innerHTML = '<div class="text-center py-4"><div class="small-loader"></div> ဖျက်နေပါသည်...</div>';
                
                const fetchUrl = `${url}?action=delete&id=${id}`;
                const response = await fetch(fetchUrl);
                const result = await response.json();
                
                if(result.status === 'success') {
                    showAlert('မှတ်တမ်း ဖျက်ပြီးပါပြီ။', 'success');
                    loadRecords();
                    loadStats(); 
                }
            } catch (error) {
                showAlert('ဖျက်ရာတွင် အမှားအယွင်းဖြစ်ပေါ်ခဲ့ပါသည်။', 'error');
                loadRecords();
            }
        }
    </script>
</body>
